name: syria_offers_app
description: تطبيق عروض سوريا - احجز عروضك بسهولة
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter   
  cupertino_icons: ^1.0.6
  http: ^1.2.1
  provider: ^6.1.5+1
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  image_picker: ^1.1.2
  geolocator: ^14.0.2
  url_launcher: ^6.3.2
  google_fonts: ^8.1.0
  shimmer: ^2.0.0
  lottie: ^3.3.3
  sqflite: ^2.3.3+1
  path: ^1.9.0
  open_filex: ^4.5.0
  path_provider: ^2.1.5
  flutter_dotenv: ^5.2.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/logo.png
    
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"