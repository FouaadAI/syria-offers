version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: syria_offers_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: syriaoffers
      POSTGRES_PASSWORD: strongpassword
      POSTGRES_DB: syriaoffers
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: syria_offers_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - app-network

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge