version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: syria_offers_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: syriaoffers
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: syriaoffers
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syriaoffers -d syriaoffers"]
      interval: 10s
      timeout: 5s
      retries: 5

  backup:
    build:
      context: .
      dockerfile: Dockerfile.backup
    container_name: syria_offers_backup
    restart: unless-stopped
    environment:
      POSTGRES_USER: syriaoffers
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: syriaoffers
    volumes:
      - backupdata:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: syria_offers_redis
    restart: unless-stopped
    networks:
      - app-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: syria_offers_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://syriaoffers:${POSTGRES_PASSWORD}@postgres:5432/syriaoffers
      REDIS_URL: redis://redis:6379/0
      DEBUG: "false"
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: syria_offers_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app-network

volumes:
  pgdata:
  backupdata:

networks:
  app-network:
    driver: bridge